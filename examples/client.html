<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Agent SDK Server Demo</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 24px;
      background: Canvas;
      color: CanvasText;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    section {
      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      border-radius: 12px;
      padding: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, textarea, button {
      font: inherit;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
      border-radius: 8px;
      padding: 10px;
      background: Canvas;
      color: CanvasText;
    }
    textarea {
      min-height: 88px;
      resize: vertical;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }
    button.secondary {
      background: color-mix(in srgb, CanvasText 12%, transparent);
      color: CanvasText;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    .actions, .options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    #output {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 420px;
      overflow: auto;
      background: color-mix(in srgb, CanvasText 7%, transparent);
      border-radius: 8px;
      padding: 12px;
    }
    .assistant {
      line-height: 1.55;
    }
    .event {
      opacity: 0.78;
      font-size: 13px;
    }
    @media (max-width: 720px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Claude Agent SDK Server Demo</h1>
      <p>
        Minimal browser client for <code>POST /agent-sdk/stream</code> and
        <code>POST /agent-sdk/answer</code>. Start the server first with
        <code>bun run dev</code>.
      </p>
    </header>

    <section>
      <div class="row">
        <div>
          <label for="endpoint">Server endpoint</label>
          <input id="endpoint" value="http://127.0.0.1:20001" />
        </div>
        <div>
          <label for="apiKey">Optional AGENT_SDK_API_KEY</label>
          <input id="apiKey" type="password" placeholder="Leave blank unless enabled" />
        </div>
      </div>

      <label for="message" style="margin-top: 12px;">Message</label>
      <textarea id="message">Explain to me what you do</textarea>

      <div class="actions">
        <button id="sendIntro">Send Intro Request</button>
        <button id="sendCustom" class="secondary">Send Custom Message</button>
        <button id="clear" class="secondary">Clear</button>
      </div>
    </section>

    <section id="questionPanel" hidden>
      <h2>Interaction Required</h2>
      <div id="questions"></div>
    </section>

    <section>
      <h2>Output</h2>
      <div id="output"></div>
    </section>
  </main>

  <script>
    const endpointInput = document.querySelector("#endpoint");
    const apiKeyInput = document.querySelector("#apiKey");
    const messageInput = document.querySelector("#message");
    const output = document.querySelector("#output");
    const questionPanel = document.querySelector("#questionPanel");
    const questionsEl = document.querySelector("#questions");
    const buttons = [
      document.querySelector("#sendIntro"),
      document.querySelector("#sendCustom"),
    ];

    function append(text, className = "event") {
      const div = document.createElement("div");
      div.className = className;
      div.textContent = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function appendAssistant(text) {
      if (!text) return;
      append(`\nAssistant:\n${text}\n`, "assistant");
    }

    function headers() {
      const result = { "Content-Type": "application/json" };
      const token = apiKeyInput.value.trim();
      if (token) result.Authorization = `Bearer ${token}`;
      return result;
    }

    function extractText(event) {
      const content = event.message?.content || event.content;
      if (!Array.isArray(content)) return "";
      return content
        .filter((block) => block?.type === "text")
        .map((block) => block.text || "")
        .join("");
    }

    async function sendStream(userMessage) {
      setBusy(true);
      questionPanel.hidden = true;
      questionsEl.innerHTML = "";
      append(`\n> ${userMessage}`);

      const body = {
        userMessage,
        options: {
          cwd: "./.claude/apps/app-icon-designer",
          allowedTools: ["Skill", "AskUserQuestion", "Bash"],
        },
      };

      try {
        const response = await fetch(`${endpointInput.value.replace(/\/$/, "")}/agent-sdk/stream`, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(body),
        });

        if (!response.ok || !response.body) {
          append(`Request failed: ${response.status} ${await response.text()}`);
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const chunks = buffer.split("\n\n");
          buffer = chunks.pop() || "";
          for (const chunk of chunks) {
            handleSseChunk(chunk);
          }
        }
      } catch (error) {
        append(`Error: ${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    function handleSseChunk(chunk) {
      const dataLine = chunk.split("\n").find((line) => line.startsWith("data: "));
      if (!dataLine) return;

      let event;
      try {
        event = JSON.parse(dataLine.slice(6));
      } catch {
        append(`Unparsed event: ${dataLine.slice(6)}`);
        return;
      }

      if (event.type === "assistant") {
        appendAssistant(extractText(event));
      } else if (event.type === "ask_user_question") {
        renderQuestions(event);
      } else if (event.type === "file_upload_request") {
        renderFileUpload(event);
      } else if (event.type === "error") {
        append(`Error: ${event.message}`);
      } else if (event.type === "result") {
        append(`Result: ${event.result || JSON.stringify(event)}`);
      } else {
        append(`[${event.type}] ${JSON.stringify(event)}`);
      }
    }

    function renderQuestions(event) {
      questionPanel.hidden = false;
      questionsEl.innerHTML = "";
      for (const question of event.questions || []) {
        const block = document.createElement("div");
        block.style.marginBottom = "14px";

        const title = document.createElement("strong");
        title.textContent = question.question || question.header || "Choose one option";
        block.appendChild(title);

        const options = document.createElement("div");
        options.className = "options";
        for (const option of question.options || []) {
          const button = document.createElement("button");
          button.textContent = option.label;
          button.title = option.description || "";
          button.onclick = () => answer(event.questionId, {
            [question.question || question.header || "answer"]: option.value || option.label,
          });
          options.appendChild(button);
        }
        block.appendChild(options);
        questionsEl.appendChild(block);
      }
    }

    function renderFileUpload(event) {
      questionPanel.hidden = false;
      questionsEl.innerHTML = "";
      const upload = event.uploads?.[0];
      const prompt = upload?.prompt || "File URL";

      const label = document.createElement("label");
      label.textContent = prompt;
      const input = document.createElement("input");
      input.placeholder = "Paste an already-uploaded file URL";
      const button = document.createElement("button");
      button.textContent = "Send File URL";
      button.style.marginTop = "8px";
      button.onclick = () => answer(event.questionId, { [prompt]: input.value.trim() });

      questionsEl.append(label, input, button);
    }

    async function answer(questionId, answers) {
      append(`Answering ${questionId}: ${JSON.stringify(answers)}`);
      questionPanel.hidden = true;
      questionsEl.innerHTML = "";

      const response = await fetch(`${endpointInput.value.replace(/\/$/, "")}/agent-sdk/answer`, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({ questionId, answers }),
      });

      if (!response.ok) {
        append(`Answer failed: ${response.status} ${await response.text()}`);
      }
    }

    function setBusy(isBusy) {
      for (const button of buttons) button.disabled = isBusy;
    }

    document.querySelector("#sendIntro").onclick = () => sendStream("Explain to me what you do");
    document.querySelector("#sendCustom").onclick = () => sendStream(messageInput.value.trim() || "Hello");
    document.querySelector("#clear").onclick = () => {
      output.innerHTML = "";
      questionPanel.hidden = true;
      questionsEl.innerHTML = "";
    };
  </script>
</body>
</html>
